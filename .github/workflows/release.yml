name: Stable Release

on:
  push:
    branches:
      - '**'
    tags:
      - stable-release
  workflow_dispatch:

# Run automatically for commits containing "stable release" (any commit in the push),
# or for explicit stable-release tag pushes / manual dispatch.

permissions:
  contents: write

# ---------- PORTABLE: всё без CGO и без DuckDB ----------
jobs:
  # GitHub-hosted Debian runners are unavailable, so Linux-hosted jobs use Ubuntu 22.04 LTS
  # as the closest stable base with broad package compatibility.
  build_portable:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/stable-release') || contains(join(github.event.commits.*.message, ' || '), 'stable release') || contains(join(github.event.commits.*.message, ' || '), 'Stable Release')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - { goos: linux,  goarch: amd64, goversion: "1.23", runner: "ubuntu-22.04" }
          - { goos: linux,  goarch: arm64, goversion: "1.23", runner: "ubuntu-22.04" }
          - { goos: linux,  goarch: 386,   goversion: "1.23", runner: "ubuntu-22.04" }
          # macOS
          - { goos: darwin, goarch: amd64, goversion: "1.23", runner: "macos-14" }
          - { goos: darwin, goarch: arm64, goversion: "1.23", runner: "macos-14" }
          # *BSD
          - { goos: freebsd, goarch: amd64, goversion: "1.23", runner: "ubuntu-22.04" }
          - { goos: freebsd, goarch: arm64, goversion: "1.23", runner: "ubuntu-22.04" }
          - { goos: openbsd, goarch: amd64, goversion: "1.23", runner: "ubuntu-22.04" }
          - { goos: openbsd, goarch: arm64, goversion: "1.23", runner: "ubuntu-22.04" }
          - { goos: netbsd,  goarch: amd64, goversion: "1.23", runner: "ubuntu-22.04" }
          # Windows
          - { goos: windows, goarch: amd64, goversion: "1.23", runner: "windows-latest" }
          - { goos: windows, goarch: arm64, goversion: "1.23", runner: "windows-latest" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "${{ matrix.goversion }}"
          cache: true
          cache-dependency-path: go.sum

      - name: go mod tidy (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: go mod tidy

      - name: go mod tidy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: go mod tidy

      - name: Build (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          export CGO_ENABLED=0
          VERSION=${{ github.run_number }}
          mkdir -p dist
          BIN="chicha-isotope-map_${GOOS}_${GOARCH}"
          GOFLAGS="-trimpath -buildvcs=false" \
          go build -tags netgo,osusergo \
                   -ldflags "-s -w -X main.CompileVersion=$VERSION" \
                   -o "dist/${BIN}"
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          $ErrorActionPreference = "Stop"
          $env:CGO_ENABLED = "0"
          $version = "${{ github.run_number }}"
          New-Item -Force -ItemType Directory dist | Out-Null
          $bin = "chicha-isotope-map_${{ matrix.goos }}_${{ matrix.goarch }}.exe"
          go build -tags "netgo,osusergo" `
                   -ldflags "-s -w -X main.CompileVersion=$version" `
                   -o "dist/$bin"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

# ---------- DUCKDB: Linux/amd64 (glibc 2.28) в контейнере + macOS (amd64/arm64) ----------
  build_duckdb:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/stable-release') || contains(join(github.event.commits.*.message, ' || '), 'stable release') || contains(join(github.event.commits.*.message, ' || '), 'Stable Release')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS amd64/arm64: нативно
          - { target: darwin_amd64_duckdb, goos: darwin, goarch: amd64, goversion: "1.23", runner: "macos-14", in_container: false }
          - { target: darwin_arm64_duckdb, goos: darwin, goarch: arm64, goversion: "1.23", runner: "macos-14", in_container: false }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- macOS нативно ---
      - name: Set up Go (macOS)
        if: matrix.in_container == false
        uses: actions/setup-go@v5
        with:
          go-version: "${{ matrix.goversion }}"
          cache: true
          cache-dependency-path: go.sum

      - name: go mod tidy (macOS)
        if: matrix.in_container == false
        shell: bash
        run: |
          go get github.com/marcboeker/go-duckdb/v2@latest
          go mod tidy

      - name: Build (macOS duckdb)
        if: matrix.in_container == false
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          export CGO_ENABLED=1
          VERSION=${{ github.run_number }}
          mkdir -p dist
          BIN="chicha-isotope-map_${GOOS}_${GOARCH}_duckdb"
          GOFLAGS="-trimpath -buildvcs=false" \
          go build -tags "netgo,osusergo,duckdb" \
                   -ldflags "-s -w -X main.CompileVersion=$VERSION" \
                   -o "dist/${BIN}"

      - name: Upload duckdb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: dist/

# ---------- DESKTOP WEBVIEW: macOS / Linux / Windows ----------
  build_desktop:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/stable-release') || contains(join(github.event.commits.*.message, ' || '), 'stable release') || contains(join(github.event.commits.*.message, ' || '), 'Stable Release')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # go-webview-selector resolves webkit2gtk via pkg-config name "webkit2gtk-4.0",
          # so Linux desktop builds provide a webkit2gtk-4.0 pkg-config target.
          - { goos: linux, goarch: amd64, goversion: "1.23", runner: "ubuntu-22.04" }
          - { goos: linux, goarch: arm64, goversion: "1.23", runner: "ubuntu-24.04-arm" }
          - { goos: darwin, goarch: amd64, goversion: "1.23", runner: "macos-14" }
          - { goos: darwin, goarch: arm64, goversion: "1.23", runner: "macos-14" }
          - { goos: windows, goarch: amd64, goversion: "1.23", runner: "windows-latest" }
          - { goos: windows, goarch: arm64, goversion: "1.23", runner: "windows-latest" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "${{ matrix.goversion }}"
          cache: true
          cache-dependency-path: go.sum

      - name: Install desktop libs (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          WEBKIT_DEV_PACKAGE="libwebkit2gtk-4.0-dev"
          if ! apt-cache show "${WEBKIT_DEV_PACKAGE}" >/dev/null 2>&1; then
            WEBKIT_DEV_PACKAGE="libwebkit2gtk-4.1-dev"
          fi
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev "${WEBKIT_DEV_PACKAGE}"

          if ! pkg-config --exists webkit2gtk-4.0 && pkg-config --exists webkit2gtk-4.1; then
            # go-webview-selector currently asks pkg-config for webkit2gtk-4.0.
            # This compatibility shim maps that lookup to webkit2gtk-4.1 on newer distros.
            sudo install -d /usr/local/lib/pkgconfig
            printf '%s\n' \
              'prefix=/usr' \
              'exec_prefix=${prefix}' \
              'libdir=${exec_prefix}/lib' \
              'includedir=${prefix}/include' \
              '' \
              'Name: webkit2gtk-4.0' \
              'Description: Compatibility shim for webkit2gtk-4.1' \
              'Version: 4.0' \
              'Requires: webkit2gtk-4.1' \
              'Libs:' \
              'Cflags:' \
              | sudo tee /usr/local/lib/pkgconfig/webkit2gtk-4.0.pc >/dev/null
            echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          fi

          pkg-config --exists webkit2gtk-4.0

      - name: go mod tidy (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: go mod tidy

      - name: go mod tidy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: go mod tidy

      - name: Build desktop (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          set -euo pipefail
          VERSION=${{ github.run_number }}
          mkdir -p dist
          BIN="chicha-isotope-map_${GOOS}_${GOARCH}_desktop"
          GOFLAGS="-trimpath -buildvcs=false" \
          go build -tags "desktop" \
                   -ldflags "-s -w -X main.CompileVersion=$VERSION" \
                   -o "dist/${BIN}"

      - name: Package desktop launcher (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          BIN="chicha-isotope-map_${GOOS}_${GOARCH}_desktop"
          APP_DIR="dist/chicha-isotope-map_${GOOS}_${GOARCH}_desktop.AppDir"
          mkdir -p "${APP_DIR}/usr/bin" \
                   "${APP_DIR}/usr/share/applications" \
                   "${APP_DIR}/usr/share/icons/hicolor/256x256/apps"

          cp "dist/${BIN}" "${APP_DIR}/usr/bin/chicha-isotope-map"
          chmod +x "${APP_DIR}/usr/bin/chicha-isotope-map"
          cp "public_html/images/apple-touch-icon.png" "${APP_DIR}/usr/share/icons/hicolor/256x256/apps/chicha-isotope-map.png"
          cp "public_html/images/apple-touch-icon.png" "${APP_DIR}/chicha-isotope-map.png"

          cat > "${APP_DIR}/AppRun" <<'APP_RUN'
          #!/usr/bin/env bash
          set -euo pipefail
          APP_DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          exec "${APP_DIR}/usr/bin/chicha-isotope-map" "$@"
          APP_RUN

          cat > "${APP_DIR}/usr/share/applications/chicha-isotope-map.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Chicha Isotope Map
          Comment=Desktop webview launcher for Chicha Isotope Map
          Exec=AppRun
          Icon=chicha-isotope-map
          Terminal=false
          Categories=Science;Utility;
          DESKTOP

          cp "${APP_DIR}/usr/share/applications/chicha-isotope-map.desktop" "${APP_DIR}/chicha-isotope-map.desktop"
          chmod +x "${APP_DIR}/AppRun" "${APP_DIR}/chicha-isotope-map.desktop"

          tar -czf "dist/${BIN}.tar.gz" -C dist "$(basename "${APP_DIR}")"

      - name: Prepare Windows icon resource
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          go install github.com/akavel/rsrc@latest
          $rsrcBin = Join-Path (go env GOPATH) "bin/rsrc.exe"
          # rsrc requires a real ICO container; app-icon.ico currently stores PNG bytes.
          $resourceArch = if ("${{ matrix.goarch }}" -eq "arm64") { "arm64" } else { "amd64" }
          & $rsrcBin -ico "public_html/images/favicon.ico" -arch $resourceArch -o "zz_chicha_icon_windows_${{ matrix.goarch }}.syso"

      - name: Build desktop (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ github.run_number }}"
          New-Item -Force -ItemType Directory dist | Out-Null
          $bin = "chicha-isotope-map_${{ matrix.goos }}_${{ matrix.goarch }}_desktop.exe"
          go build -tags "desktop" `
                   -ldflags "-H windowsgui -s -w -X main.CompileVersion=$version" `
                   -o "dist/$bin"

      - name: Package desktop app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bin = "chicha-isotope-map_${{ matrix.goos }}_${{ matrix.goarch }}_desktop.exe"
          Compress-Archive -Path "dist/$bin" -DestinationPath "dist/chicha-isotope-map_${{ matrix.goos }}_${{ matrix.goarch }}_desktop.zip" -Force

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-desktop-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  build_desktop_macos_universal:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/stable-release') || contains(join(github.event.commits.*.message, ' || '), 'stable release') || contains(join(github.event.commits.*.message, ' || '), 'Stable Release')
    needs: [build_desktop]
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bin-desktop-darwin-*
          merge-multiple: true
          path: dist/

      - name: Build universal desktop binary
        shell: bash
        run: |
          set -euo pipefail
          AMD64_BIN="dist/chicha-isotope-map_darwin_amd64_desktop"
          ARM64_BIN="dist/chicha-isotope-map_darwin_arm64_desktop"
          UNIVERSAL_BIN="dist/chicha-isotope-map_darwin_universal_desktop"
          lipo -create "${AMD64_BIN}" "${ARM64_BIN}" -output "${UNIVERSAL_BIN}"
          chmod +x "${UNIVERSAL_BIN}"

      - name: Package universal desktop app (macOS)
        shell: bash
        run: |
          set -euo pipefail
          BIN="chicha-isotope-map_darwin_universal_desktop"
          APP_NAME="Chicha Isotope Map"
          APP_DIR="dist/${APP_NAME}.app"
          ICONSET_DIR="dist/AppIcon.iconset"
          ICON_SOURCE="public_html/images/apple-touch-icon.png"

          mkdir -p "${ICONSET_DIR}" "${APP_DIR}/Contents/MacOS" "${APP_DIR}/Contents/Resources"
          for size in 16 32 128; do
            sips -z "${size}" "${size}" "${ICON_SOURCE}" --out "${ICONSET_DIR}/icon_${size}x${size}.png" >/dev/null
            double_size=$((size * 2))
            sips -z "${double_size}" "${double_size}" "${ICON_SOURCE}" --out "${ICONSET_DIR}/icon_${size}x${size}@2x.png" >/dev/null
          done
          sips -z 256 256 "${ICON_SOURCE}" --out "${ICONSET_DIR}/icon_256x256.png" >/dev/null
          sips -z 512 512 "${ICON_SOURCE}" --out "${ICONSET_DIR}/icon_256x256@2x.png" >/dev/null
          sips -z 512 512 "${ICON_SOURCE}" --out "${ICONSET_DIR}/icon_512x512.png" >/dev/null
          cp "${ICONSET_DIR}/icon_512x512.png" "${ICONSET_DIR}/icon_512x512@2x.png"
          iconutil -c icns "${ICONSET_DIR}" -o "dist/AppIcon.icns"

          cp "dist/${BIN}" "${APP_DIR}/Contents/MacOS/chicha-isotope-map"
          chmod +x "${APP_DIR}/Contents/MacOS/chicha-isotope-map"
          cp "dist/AppIcon.icns" "${APP_DIR}/Contents/Resources/AppIcon.icns"

          cat > "${APP_DIR}/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Chicha Isotope Map</string>
            <key>CFBundleDisplayName</key>
            <string>Chicha Isotope Map</string>
            <key>CFBundleIdentifier</key>
            <string>net.zabiyaka.chicha-isotope-map</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.run_number }}</string>
            <key>CFBundleExecutable</key>
            <string>chicha-isotope-map</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon.icns</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          PLIST

          ditto -c -k --sequesterRsrc --keepParent "${APP_DIR}" "dist/${BIN}.app.zip"

      - name: Upload macOS universal desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-desktop-darwin-universal
          path: dist/chicha-isotope-map_darwin_universal_desktop*

  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/stable-release') || contains(join(github.event.commits.*.message, ' || '), 'stable release') || contains(join(github.event.commits.*.message, ' || '), 'Stable Release')
    needs: [build_portable, build_duckdb, build_desktop, build_desktop_macos_universal]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-raw/

      - name: Publish GitHub Release (stable tag)
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: stable-release
          name: "Stable Release"
          body_path: .github/release/stable-release.md
          make_latest: true
          prerelease: false
          overwrite_files: true
          files: dist-raw/**/*
